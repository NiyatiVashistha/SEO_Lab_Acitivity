<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta name="google-site-verification" content="ZF-OzHAgSkzOtxIESrcMjBv3L2i3kslNzk_WGwYSYLA" />
    
    <title>Academic Portal | Exam Center</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #ffffff;
            color: #1a1a1a;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .content-wrapper {
            max-width: 600px;
            padding: 40px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 600;
            margin-bottom: 16px;
            color: #111827;
        }

        p {
            font-size: 1.125rem;
            color: #4b5563;
            line-height: 1.6;
            margin-bottom: 32px;
        }

        .divider {
            height: 1px;
            width: 80px;
            background-color: #e5e7eb;
            margin: 0 auto 32px;
        }

        .footer-note {
            font-size: 0.875rem;
            color: #9ca3af;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body>

    <div class="content-wrapper">
        <h1>All the best for your exams.</h1>
        <div class="divider"></div>
        <p>
            Stay focused, stay calm, and give it your best effort. 
            Success is the result of preparation meeting opportunity.
        </p>
        <span class="footer-note">Examination Management Portal</span>
    </div>

</body>
</html>
